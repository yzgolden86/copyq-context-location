[Command]
Name=定位|回到原历史中的当前记录
Command="
copyq:
function itemSignatureExact(item) {
    return toBase64(pack(item));
}

function itemText(item) {
    var text = str(read('text/plain', item));
    if (!text)
        text = str(read('text', item));
    return text;
}

var srcTab = selectedTab();
if (!srcTab)
    srcTab = str(data(mimeCurrentTab));

if (!srcTab)
    abort();

var selected = selectedItemData(0);
if (!selected || Object.keys(selected).length === 0) {
    popup('CopyQ', '请先选中一条记录');
    abort();
}

var targetExact = itemSignatureExact(selected);
var targetText = itemText(selected);

tab(srcTab);
filter('');

var found = -1;

// 第一轮：整项精确匹配，优先最近
for (var i = size() - 1; i >= 0; --i) {
    if (itemSignatureExact(getItem(i)) === targetExact) {
        found = i;
        break;
    }
}

// 第二轮：文本回退匹配，优先最近
if (found < 0 && targetText) {
    for (var j = size() - 1; j >= 0; --j) {
        if (itemText(getItem(j)) === targetText) {
            found = j;
            break;
        }
    }
}

if (found < 0) {
    popup('CopyQ', '未能在原历史中重新定位该记录');
    abort();
}

show(srcTab);
selectItems(found);
"
InMenu=true
Shortcut=Ctrl+Shift+G
